services:
  db:
    restart: unless-stopped
    image: postgis/postgis:18-3.6
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - defaultNetwork
    environment:
      POSTGRES_USERNAME: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SHARED_BUFFERS: 2GB
      POSTGRES_MAINTENANCE_WORK_MEM: 2GB
      POSTGRES_AUTOVACUUM_WORK_MEM: 2GB
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USERNAME -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    shm_size: 1gb

  # Open Street Maps
  tileserver:
    image: maptiler/tileserver-gl
    ports:
      - "6703:8080"
    volumes:
      - ./.osm-data/tileserver/map.mbtiles:/data/map.mbtiles
    command: ["--mbtiles", "map.mbtiles"]
  geocoder:
    image: mediagis/nominatim:5.2
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "6701:8080"
    volumes:
      - ./.osm-data/nominatim:/nominatim/data
      - ./.osm-data/philippines-latest.osm.pbf:/nominatim/data/philippines-latest.osm.pbf
    environment:
      PBF_PATH: /nominatim/data/philippines-latest.osm.pbf
      THREADS: 8

      NOMINATIM_TOKENIZER: icu
      NOMINATIM_DATABASE_DSN: ${NOMINATIM_DATABASE_DSN}
      PGHOST: db
      PGDATABASE: nominatim
      PGUSER: ${POSTGRES_USERNAME}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/search?q=jaro"]
      interval: 30s
      retries: 9999
      start_period: 20m
    networks:
      - defaultNetwork
  valhalla:
    image: ghcr.io/valhalla/valhalla-scripted:latest
    depends_on:
      geocoder:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "6702:8002"
    volumes:
      - ./.osm-data/valhalla:/custom_files
      - ./.osm-data/philippines-latest.osm.pbf:/custom_files/philippines-latest.osm.pbf
    environment:
      - build_threads=2
      - build_memory=4G
      - serve_tiles=True
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8002/status" ]
      interval: 30s
      retries: 9999
      start_period: 30m
    networks:
      - defaultNetwork
  graphhopper:
    image: israelhikingmap/graphhopper:latest
    container_name: graphhopper
    restart: unless-stopped
    ports:
      - "6704:8989"
    volumes:
      - ./.osm-data/graphhopper:/data
      - ./.osm-data/philippines-latest.osm.pbf:/data/philippines-latest.osm.pbf
    environment:
      - JAVA_OPTS=-Xmx2g -Xms2g -Ddw.graphhopper.graph.encoded_values=car_access,car_average_speed,country,road_class,roundabout,max_speed,foot_access,foot_average_speed,foot_priority,foot_road_access,hike_rating,average_slope,bike_access,bike_average_speed,bike_priority,bike_road_access,bike_network,mtb_rating,ferry_speed,road_environment
    command: >
      -i /data/philippines-latest.osm.pbf
      -o /data/graph-cache 
      --host 0.0.0.0
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8989/info || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 9999
      start_period: 10m
    networks:
      - defaultNetwork

networks:
  defaultNetwork:
    driver: bridge
